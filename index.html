<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Tournament Manager - South African Ratings</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
</head>
<body>
    <div class="container">
        <h1>♞ South African Chess Tournament Manager ♞</h1>
        
        <!-- Offline Status Indicator -->
        <div id="offlineStatus" class="offline-status" style="display: none;">
            ⚡ Working Offline - Changes will be saved locally
        </div>
        
        <!-- Tournament Setup Section -->
        <div class="input-section">
            <h2>Tournament Setup</h2>
            <div class="form-group">
                <label for="players">Enter Players (Name, Rating - one per line)</label>
                <textarea id="players" placeholder="Example:&#10;John Doe, 1850&#10;Jane Smith, 1720">John Doe, 1850
Jane Smith, 1720
Bob Johnson, 1680
Alice Brown, 1550
Mike Wilson, 1420
Sarah Lee, 1380</textarea>
                <div class="help-text">Format: Name, Rating (one player per line)</div>
            </div>
            
            <div class="form-group">
                <label for="rounds">Number of Rounds</label>
                <input type="number" id="rounds" min="1" max="10" value="5">
            </div>
            
            <button onclick="tournamentApp.initialize()">Start Tournament</button>
            <button class="danger" onclick="tournamentApp.reset()">Reset</button>
            <button class="secondary" onclick="tournamentApp.saveToFile()">💾 Save Tournament</button>
            <button class="secondary" onclick="tournamentApp.loadFromFile()">📂 Load Tournament</button>
        </div>

        <!-- Tournament Content -->
        <div id="tournamentContent" style="display: none;"></div>

        <!-- Standings Content -->
        <div id="standingsContent" style="display: none;"></div>
        
        <!-- Auto-save Indicator -->
        <div id="autoSaveIndicator" class="auto-save-indicator" style="display: none;">
            💾 Auto-saved
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered');
                        updateOnlineStatus();
                        window.addEventListener('online', updateOnlineStatus);
                        window.addEventListener('offline', updateOnlineStatus);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        function updateOnlineStatus() {
            const offlineStatus = document.getElementById('offlineStatus');
            if (!navigator.onLine) {
                offlineStatus.style.display = 'block';
            } else {
                offlineStatus.style.display = 'none';
            }
        }
    </script>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/pairing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
