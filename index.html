<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>♞ Chess Tournament Manager - Black Edition</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="container">
        <h1>♞ CHESS TOURNAMENT MANAGER ♞</h1>
        
        <!-- Offline Status Indicator -->
        <div id="offlineStatus" class="offline-status" style="display: none;">
            ⚡ OFFLINE MODE - Changes saved locally
        </div>
        
        <!-- Tournament Setup Section -->
        <div class="input-section">
            <h2>TOURNAMENT SETUP</h2>
            
            <div class="players-input-container">
                <div class="players-header">
                    <h3>PLAYER ENTRIES</h3>
                    <button class="add-player-btn" onclick="tournamentApp.addPlayerField()">+ ADD PLAYER</button>
                </div>
                
                <div id="player-fields" class="player-fields">
                    <!-- Player fields will be dynamically added here -->
                </div>
                
                <div class="players-help-text">
                    <span class="info-icon">ⓘ</span> Zero ratings allowed (for unrated players)
                </div>
            </div>
            
            <div class="form-group">
                <label for="rounds">NUMBER OF ROUNDS</label>
                <input type="number" id="rounds" min="1" max="10" value="5" class="modern-input">
            </div>
            
            <div class="action-buttons">
                <button onclick="tournamentApp.initialize()" class="primary-btn">▶ START TOURNAMENT</button>
                <button onclick="tournamentApp.reset()" class="danger-btn">⟲ RESET</button>
                <button onclick="tournamentApp.saveToFile()" class="secondary-btn">💾 SAVE</button>
                <button onclick="tournamentApp.loadFromFile()" class="secondary-btn">📂 LOAD</button>
            </div>
        </div>

        <!-- Tournament Content -->
        <div id="tournamentContent" style="display: none;"></div>

        <!-- Standings Content -->
        <div id="standingsContent" style="display: none;"></div>
        
        <!-- Auto-save Indicator -->
        <div id="autoSaveIndicator" class="auto-save-indicator" style="display: none;">
            💾 AUTO-SAVED
        </div>
    </div>

    <!-- Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => {
                        console.log('ServiceWorker registered');
                        updateOnlineStatus();
                        window.addEventListener('online', updateOnlineStatus);
                        window.addEventListener('offline', updateOnlineStatus);
                    })
                    .catch(err => {
                        console.log('ServiceWorker registration failed: ', err);
                    });
            });
        }
        
        function updateOnlineStatus() {
            const offlineStatus = document.getElementById('offlineStatus');
            if (!navigator.onLine) {
                offlineStatus.style.display = 'block';
            } else {
                offlineStatus.style.display = 'none';
            }
        }
    </script>

    <script src="js/utils.js"></script>
    <script src="js/db.js"></script>
    <script src="js/tournament.js"></script>
    <script src="js/pairing.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
